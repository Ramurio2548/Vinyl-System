services:
  # Backend Service (Rust)
  - type: web
    name: vinyl-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health # Simple health check route
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinyl-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_ENDPOINT_URL
        sync: false

  # Frontend Service (Next.js Static Site)
  - type: web
    name: vinyl-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: vinyl-backend
          property: host

databases:
  - name: vinyl-db
    plan: free
